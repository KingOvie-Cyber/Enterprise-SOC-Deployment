############################################################
# props.conf — Sourcetype Parsing Configuration
# Location: /opt/splunk/etc/system/local/props.conf
#
# PURPOSE:
# Defines how Splunk parses incoming events — timestamp
# format, line merging behavior, field extraction,
# and routing transforms per source.
############################################################

[meraki_syslog]
SHOULD_LINEMERGE = false
# Each syslog line is a discrete event — do not merge lines

TIME_PREFIX = ^
# Timestamp starts at the beginning of the line

TIME_FORMAT = %b %d %H:%M:%S
# Meraki timestamp format: Jun 29 09:32:08

MAX_TIMESTAMP_LOOKAHEAD = 32
# Look ahead 32 characters to find the timestamp

TRUNCATE = 99999
# Do not truncate long Meraki URL log lines


[source::udp:514]
TRANSFORMS-routing = route_meraki
# Apply the Meraki routing transform to all UDP 514 events

sourcetype = meraki_syslog
# Assign sourcetype to all events arriving on UDP 514


############################################################
# SYSMON NOTES
# The Sysmon sourcetype is automatically assigned by the
# Universal Forwarder inputs.conf:
#   sourcetype = XmlWinEventLog:Microsoft-Windows-Sysmon/Operational
#
# No additional props.conf configuration is required for
# Sysmon because renderXml=true in inputs.conf causes the
# forwarder to preserve XML structure, and Splunk's built-in
# XML parsing handles field extraction automatically.
############################################################


############################################################
# WINDOWS EVENT LOG NOTES
# Windows Event Log sourcetypes are automatically assigned
# by the Universal Forwarder inputs.conf:
#   sourcetype = WinEventLog:Security
#   sourcetype = WinEventLog:System
#   sourcetype = WinEventLog:Application
#
# Splunk's built-in Windows Event Log parsing handles
# field extraction for standard Windows event codes.
############################################################
